name: Sync Fork with Upstream

on:
  # Run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/renode/renode-infrastructure.git || true
          git fetch upstream
      
      - name: Sync with upstream using ours strategy
        run: |
          # Get the default branch name
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          echo "Default branch: $DEFAULT_BRANCH"
          
          # Checkout the default branch
          git checkout $DEFAULT_BRANCH
          
          # Merge upstream changes, using 'ours' strategy to resolve conflicts
          # This keeps our changes in case of conflicts
          git merge upstream/$DEFAULT_BRANCH -X ours -m "Sync with upstream (ours strategy for conflicts)" || {
            echo "Merge had conflicts, resolving with ours strategy..."
            # If there are unresolved conflicts, use ours for all files
            git status --porcelain | grep '^UU' | cut -c4- | while read file; do
              git checkout --ours "$file"
              git add "$file"
            done
            git commit -m "Sync with upstream (resolved conflicts with ours strategy)" --no-edit || true
          }
      
      - name: Push changes
        run: |
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          git push origin $DEFAULT_BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
